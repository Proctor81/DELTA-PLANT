name: Check Render Free Pilot

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

concurrency:
  group: check-render-free-pilot
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run DELTA Render Free pilot smoke check
        run: python3 tools/check_render_free_pilot.py
