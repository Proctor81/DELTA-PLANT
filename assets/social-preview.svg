<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DELTA Plant social preview</title>
  <desc id="desc">A cinematic social card for DELTA Plant featuring AI Plant Health messaging, DELTAPLANO access, LayerCAM, edge AI, and public benchmark metrics.</desc>
  <defs>
