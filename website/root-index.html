<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DELTA Plant | Raspberry Pi</title>
  <meta name="description" content="The full DELTA Plant landing page is temporarily available at deltaplant.ai/Raspberrypi." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="canonical" href="https://deltaplant.ai/" />
  <link rel="icon" type="image/png" href="https://cdn.phototourl.com/free/2026-05-13-61bc9ec4-7904-4961-9bed-e3501e540eae.png" />
  <style>
    :root {
      color-scheme: light;
      --ink: #050505;
      --link: #0b57d0;
      --link-hover: #083b8f;
      --paper: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background: var(--paper);
      color: var(--ink);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    main {
      text-align: center;
    }

    p {
      margin: 0 0 1rem;
      font-size: clamp(1rem, 1.4vw, 1.2rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    a {
      color: var(--link);
      font-size: clamp(2.8rem, 9vw, 6.5rem);
      font-weight: 800;
      line-height: 0.95;
      text-decoration-thickness: 0.12em;
      text-underline-offset: 0.12em;
      word-break: break-word;
    }

    a:hover,
    a:focus-visible {
      color: var(--link-hover);
    }
  </style>
</head>
<body>
  <main>
    <p>DELTA Plant</p>
    <a href="/Raspberrypi/">deltaplant.ai/Raspberrypi</a>
  </main>
</body>
</html>
